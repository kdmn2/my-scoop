<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator WW FlexiPoints</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px; /* Zapobiega automatycznemu przybliżaniu na iOS */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        .result-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
        }
        .result-title {
            font-size: 14px;
            color: #1e40af;
            margin: 0 0 4px 0;
        }
        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkulator WW FlexiPoints</h1>

    <div class="input-group">
        <label for="kcal">Kalorie (kcal) na 100g:</label>
        <input type="number" id="kcal" placeholder="np. 350" inputmode="decimal">
    </div>

    <div class="input-group">
        <label for="fat">Tłuszcz (g) na 100g:</label>
        <input type="number" id="fat" placeholder="np. 8.5" step="0.1" inputmode="decimal">
    </div>

    <div class="input-group">
        <label for="weight">Ilość zjedzonych gramów (g):</label>
        <input type="number" id="weight" placeholder="np. 150" inputmode="decimal">
    </div>

    <div class="result-box">
        <p class="result-title">WYNIK PORCJI</p>
        <p class="result-value" id="points-output">0.0<span style="font-size: 18px; font-weight: normal; margin-left: 4px;">pkt</span></p>
    </div>
</div>

<script>
    const kcalInput = document.getElementById('kcal');
    const fatInput = document.getElementById('fat');
    const weightInput = document.getElementById('weight');
    const pointsOutput = document.getElementById('points-output');

    function calculatePoints() {
        const kcal = parseFloat(kcalInput.value) || 0;
        const fat = parseFloat(fatInput.value) || 0;
        const weight = parseFloat(weightInput.value) || 0;

        if (weight <= 0) {
            pointsOutput.innerHTML = '0.0<span style="font-size: 18px; font-weight: normal; margin-left: 4px;">pkt</span>';
            return;
        }

        // Oficjalny wzór FlexiPoints na 100g
        const pointsPer100g = (kcal / 60) + (fat / 9);

        // Przeliczenie na zjedzoną wagę
        const totalPoints = pointsPer100g * (weight / 100);

        // Wyświetlanie wyniku zaokrąglonego do 1 miejsca po przecinku
        pointsOutput.innerHTML = `${totalPoints.toFixed(1)}<span style="font-size: 18px; font-weight: normal; margin-left: 4px;">pkt</span>`;
    }

    // Automatyczne przeliczanie przy każdej zmianie wartości (bez klikania "Oblicz")
    kcalInput.addEventListener('input', calculatePoints);
    fatInput.addEventListener('input', calculatePoints);
    weightInput.addEventListener('input', calculatePoints);
</script>

</body>
</html>
